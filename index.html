<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassify - Glasses Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <img src="assets/Images/logo.png" alt="Logo">
            </div>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Designer Frames</a></li>
                <li><a href="#">Premium Collection</a></li>
                <li><a href="#">Sunglasses</a></li>
                <li><a href="#">Contact Lenses</a></li>
                <li><a href="#">Sale</a></li>
            </ul>
            <div class="nav-icons">
                <span>🔍</span>
                <span>🛒</span>
            </div>
        </nav>
        <section class="hero">
            <div class="hero-text">
                <h1>See the World in Style</h1>
                <p>Premium glasses designed for comfort, clarity, and fashion.</p>
                <button>Shop Now</button>
            </div>
            <div class="hero-image">
                <img src="assets/Images/hero_image.jpg" alt="Hero Glasses">
            </div>
        </section>
<section class="categories">

            <h2>Shop by Category</h2>

            <div class="category-grid">

                <div class="category-card">
                    <img src="assets/sunglasses.jpg" alt="Sunglasses">
                    <h3>Sunglasses</h3>
                </div>

                <div class="category-card">
                    <img src="assets/prescription.jpg" alt="Prescription Glasses">
                    <h3>Prescription Glasses</h3>
                </div>

                <div class="category-card">
                    <img src="assets/blue-light.jpg" alt="Blue Light Glasses">
                    <h3>Blue Light Glasses</h3>
                </div>

                <div class="category-card">
                    <img src="assets/luxury.jpg" alt="Luxury Frames">
                    <h3>Luxury Frames</h3>
                </div>

            </div>

        </section>

    </div>
</body>
</html>
</body>
</html>
